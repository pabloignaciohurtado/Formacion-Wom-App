# Workflow temporal de un solo uso: regenera package-lock.json cuando la rama
# lo dejó fuera de sincronía con package.json. Se elimina antes del merge.
name: Sync lockfile

on:
  push:
    branches: [fix/srs-vence-al-inicio-del-dia]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerar package-lock.json
        run: npm install --package-lock-only --no-audit --no-fund

      - name: Commit y push si cambió
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "El lockfile ya está en sincronía; nada que hacer."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "fix(ci): sincronizar package-lock.json con vitest"
          git push
