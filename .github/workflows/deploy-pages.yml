name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm install (no `npm ci`): el proxy de esta sesión no permite pushear
      # el package-lock.json regenerado (268 KB), así que el lock puede quedar
      # detrás de package.json. `npm install` reconcilia ambos; `npm ci` fallaría.
      - name: Instalar dependencias
        run: npm install

      # Sin esta guarda, un secret ausente compila igual y publica una app que
      # revienta en el navegador con "Faltan las variables de entorno".
      # Es preferible fallar aquí, ruidosamente, que desplegar algo roto.
      - name: Verificar que los secrets existen
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          faltan=""
          [ -n "$VITE_SUPABASE_URL" ] || faltan="$faltan VITE_SUPABASE_URL"
          [ -n "$VITE_SUPABASE_ANON_KEY" ] || faltan="$faltan VITE_SUPABASE_ANON_KEY"
          if [ -n "$faltan" ]; then
            echo "::error::Faltan secrets del repositorio:$faltan"
            echo "Defínelos en Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Compilar con base de Pages
        run: npm run build -- --base=/Formacion-Wom-App/
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Fallback SPA (404.html)
        run: cp dist/index.html dist/404.html

      - name: Publicar a la rama gh-pages
        run: |
          cd dist
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: ${GITHUB_SHA}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
