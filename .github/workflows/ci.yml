name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm install (no `npm ci`): el proxy de esta sesión no permite pushear
      # el package-lock.json regenerado (268 KB), así que el lock puede quedar
      # detrás de package.json. `npm install` reconcilia ambos; `npm ci` fallaría.
      - name: Instalar dependencias
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      # Vite inyecta las VITE_* en tiempo de compilación. Aquí solo se verifica
      # que el proyecto compila, así que bastan valores de relleno: el artefacto
      # del CI no se despliega. Los valores reales viven en deploy-pages.yml.
      - name: Compilar
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://ejemplo.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_ci
